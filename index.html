function getDistance(lat1, lng1, lat2, lng2) {
  var R = 6371;
  var dLat = (lat2 - lat1) * Math.PI / 180;
  var dLng = (lng2 - lng1) * Math.PI / 180;
  var a = Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLng/2) * Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

var categories = ["전체", "⭐ 즐겨찾기", "한식", "중식", "일식", "양식/기타"];

var favorites = JSON.parse(localStorage.getItem("favRestaurants") || "[]");
function isFav(id) { return favorites.indexOf(id) !== -1; }
function toggleFav(id, e) {
  if (e) { e.stopPropagation(); }
  var idx = favorites.indexOf(id);
  if (idx === -1) favorites.push(id); else favorites.splice(idx, 1);
  localStorage.setItem("favRestaurants", JSON.stringify(favorites));
  renderList();
  var openDetail = document.getElementById("overlay").classList.contains("active");
  if (openDetail) { openDetailView(id); }
}
var moods = ["전체", "접대", "회식", "캐주얼"];
var currentMood = "전체";

function renderMoodTabs() {
  document.getElementById("moodTabs").innerHTML = moods.map(function(m) {
    return '<div class="tab ' + (m === currentMood ? 'active' : '') + '" onclick="selectMood(\'' + m + '\')">' + m + '</div>';
  }).join("");
}
function selectMood(m) { currentMood = m; renderMoodTabs(); renderList(); }

var distanceFilters = [
  { label: "전체", max: 999 },
  { label: "500m 이내", max: 0.5 },
  { label: "1km 이내", max: 1 },
  { label: "3km 이내", max: 3 }
];
var currentCategory = "전체";
var currentMaxDistance = 999;

function calcDistances() {
  var b = bases[currentBase];
  restaurants.forEach(function(r) {
    r.distance = getDistance(b.lat, b.lng, r.lat, r.lng);
    r.distanceText = r.distance < 1
      ? (r.distance * 1000).toFixed(0) + 'm'
      : r.distance.toFixed(1) + 'km';
  });
}

function changeBase() {
  currentBase = document.getElementById("baseSelect").value;
  calcDistances();
  renderList();
}

function renderTabs() {
  document.getElementById("tabs").innerHTML = categories.map(function(cat) {
    return '<div class="tab ' + (cat === currentCategory ? 'active' : '') + '" onclick="selectCategory(\'' + cat + '\')">' + cat + '</div>';
  }).join("");
}

function selectCategory(cat) {
  currentCategory = cat;
  renderTabs();
  renderList();
}

function renderDistanceFilter() {
  document.getElementById("filterBar").innerHTML = distanceFilters.map(function(f) {
    return '<div class="filter-chip ' + (f.max === currentMaxDistance ? 'active' : '') + '" onclick="selectDistance(' + f.max + ')">' + f.label + '</div>';
  }).join("");
}

function selectDistance(max) {
  currentMaxDistance = max;
  renderDistanceFilter();
  renderList();
}

function renderList() {
  var listEl = document.getElementById("list");
  var filtered = restaurants.filter(function(r) {
    var catMatch = currentCategory === "전체" || r.category === currentCategory || (currentCategory === "⭐ 즐겨찾기" && isFav(r.id));
    var moodMatch = currentMood === "전체" || r.mood === currentMood;
    if (currentCategory === "⭐ 즐겨찾기") return isFav(r.id) && r.distance <= currentMaxDistance && moodMatch;
    return catMatch && r.distance <= currentMaxDistance && moodMatch;
  });
  filtered.sort(function(a, b) { return a.distance - b.distance; });

  document.getElementById("resultCount").textContent = bases[currentBase].name + " 기준 · " + filtered.length + "개 식당";

  if (filtered.length === 0) {
    var emptyMsg = currentCategory === "⭐ 즐겨찾기" ? '즐겨찾기한 식당이 없습니다.<br><span style="font-size:12px;">식당 카드의 ☆ 버튼을 눌러 추가하세요.</span>' : '해당 조건에 맞는 식당이 없습니다.';
    listEl.innerHTML = '<div class="empty-state">' + emptyMsg + '</div>';
    return;
  }

  listEl.innerHTML = filtered.map(function(r) {
    var b = '';
    if (r.hasRoom) b += '<span class="badge badge-room">룸</span>';
    if (r.corkage === '콜키지 프리') b += '<span class="badge badge-corkage">콜키지 프리</span>';
    else if (r.corkage === '1병 무료') b += '<span class="badge badge-corkage">콜키지 1병 무료</span>';
    if (r.parking && r.parking !== '불가' && r.parking !== '불가 (백화점 내)') b += '<span class="badge badge-parking">주차</span>';
    if (r.mood === '접대') b += '<span class="badge badge-formal">접대</span>';
    else if (r.mood === '회식') b += '<span class="badge badge-casual">회식</span>';

    var star = isFav(r.id) ? '★' : '☆';
    return '<div class="card" onclick="openDetail(' + r.id + ')">' +
      '<div class="card-body">' +
        '<div class="card-top">' +
          '<div class="card-title-area">' +
            '<div class="card-name-row"><button class="fav-btn' + (isFav(r.id) ? ' active' : '') + '" onclick="toggleFav(' + r.id + ',event)" style="color:' + (isFav(r.id) ? '#f0c040' : '#555') + '">' + star + '</button><span class="card-name">' + r.name + '</span><span class="card-distance">' + r.distanceText + '</span></div>' +
            '<div class="card-category">' + r.subcategory + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="card-addr">' + (r.shortAddr || '') + '</div>' +
        '<div class="badges" style="margin-top:10px;">' + b + '</div>' +
      '</div></div>';
  }).join("");
}

function openDetail(id) { openDetailView(id); }
function openDetailView(id) {
  var r = restaurants.find(function(x) { return x.id === id; });
  if (!r) return;
  var nUrl = 'https://map.naver.com/v5/search/' + encodeURIComponent(r.naverQuery);
  var gUrl = 'https://www.google.com/maps/search/' + encodeURIComponent(r.name + ' ' + r.address);
  var cUrl = r.catchTableId ? 'https://app.catchtable.co.kr/ct/shop/' + r.catchTableId : 'https://app.catchtable.co.kr/ct/search?keyword=' + encodeURIComponent(r.name + ' 판교');

  var menuRows = r.menus.map(function(m) { return '<tr><td>' + m.name + '</td><td>' + m.price + '</td></tr>'; }).join("");
  var badges = '';
  if (r.hasRoom) badges += '<span class="badge badge-room">룸</span>';
  if (r.corkage === '콜키지 프리') badges += '<span class="badge badge-corkage">콜키지 프리</span>';
  else if (r.corkage === '1병 무료') badges += '<span class="badge badge-corkage">콜키지 1병 무료</span>';
  if (r.parking && r.parking !== '불가') badges += '<span class="badge badge-parking">주차</span>';
  if (r.mood === '접대') badges += '<span class="badge badge-formal">접대</span>';
  else if (r.mood === '회식') badges += '<span class="badge badge-casual">회식</span>';

  document.getElementById("detail").innerHTML =
    '<div class="detail-header">' +
      '<div class="detail-handle"></div>' +
      '<button class="close-btn" onclick="closeDetail()">&times;</button>' +
      '<div class="detail-name"><button class="fav-btn" onclick="toggleFav(' + r.id + ',event)" style="color:' + (isFav(r.id) ? '#f0c040' : '#555') + ';font-size:24px;vertical-align:middle;margin-right:4px;">' + (isFav(r.id) ? '★' : '☆') + '</button>' + r.name + ' <span style="font-size:12px;color:var(--primary);font-weight:700;">' + r.distanceText + '</span></div>' +
      '<div class="detail-sub">' + r.subcategory + ' · ' + r.priceRange + '</div>' +
      '<div class="detail-badges">' + badges + '</div>' +
    '</div>' +
    '<div class="reservation-box">' +
      '<h3>예약 안내</h3>' +
      '<a class="phone" href="tel:' + r.phone + '">' + r.phone + '</a>' +
      '<div class="reservation-links">' +
        '<a class="link-naver" href="' + nUrl + '" target="_blank">📍 네이버 지도</a>' +
        '<a class="link-catchtable" href="' + cUrl + '" target="_blank">' + (r.catchTableId ? '🔖 캐치테이블 예약' : '🔍 캐치테이블') + '</a>' +
        '<a class="link-google" href="' + gUrl + '" target="_blank">📍 Google 지도</a>' +
      '</div>' +
    '</div>' +
    '<div class="detail-section"><h4>기본 정보</h4>' +
      '<div class="info-grid">' +
        '<span class="info-label">주소</span><span>' + r.address + '</span>' +
        '<span class="info-label">영업시간</span><span>' + r.hours + '</span>' +
        '<span class="info-label">주차</span><span>' + r.parking + '</span>' +
        '<span class="info-label">룸</span><span>' + r.roomInfo + '</span>' +
        '<span class="info-label">콜키지</span><span>' + r.corkage + '</span>' +
      '</div></div>' +
    '<div class="detail-section"><h4>메뉴 & 가격</h4><table class="menu-table">' + menuRows + '</table></div>' +
    (r.note ? '<div class="detail-section"><h4>참고사항</h4><p class="note-text">' + r.note + '</p></div>' : '') +
    '<div class="footer-text">가격 및 메뉴는 변동될 수 있습니다. 방문 전 전화 확인을 권장합니다.</div>';

  document.getElementById("overlay").classList.add("active");
  document.body.style.overflow = "hidden";
}

function closeDetail(e) {
  if (e && e.target !== document.getElementById("overlay")) return;
  document.getElementById("overlay").classList.remove("active");
  document.body.style.overflow = "";
}

document.addEventListener("keydown", function(e) { if (e.key === "Escape") closeDetail(); });

calcDistances();
renderTabs();
renderMoodTabs();
renderDistanceFilter();
renderList();
</script>
</body>
</html>
